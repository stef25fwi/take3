name: take30
description: Prouve ton talent en 30 secondes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9
  camera: ^0.10.5+9
  video_player: ^2.8.6
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  cloud_functions: ^5.1.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  shared_preferences: ^2.3.2
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.3
  share_plus: ^12.0.2
  app_links: ^6.1.1
  uuid: ^4.4.0
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  vibration: ^2.0.0
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/avatars/
    - assets/scenes/
    - assets/onboarding/
    - ../take 30 images IA/
