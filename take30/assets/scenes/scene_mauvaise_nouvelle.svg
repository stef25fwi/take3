<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="sbg4" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1A1028"/>
      <stop offset="100%" stop-color="#060410"/>
    </radialGradient>
    <radialGradient id="sk_s4" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7A4020"/>
      <stop offset="100%" stop-color="#4A2010"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sbg4)"/>
  <!-- Cold blue side light -->
  <path d="M0 0 L150 0 L150 300 L0 300Z" fill="#00D4FF" opacity="0.04"/>
  <!-- Character - medium shot -->
  <ellipse cx="200" cy="285" rx="78" ry="36" fill="#0D1626"/>
  <!-- Shirt collar -->
  <path d="M175 225 L200 235 L225 225" stroke="#1E3A5F" stroke-width="8" fill="none" stroke-linejoin="round"/>
  <rect x="176" y="220" width="48" height="50" rx="8" fill="url(#sk_s4)"/>
  <!-- Hair - close crop -->
  <path d="M155 138 Q158 98 200 93 Q242 98 245 138" fill="#050202"/>
  <!-- Face - stern, heavy -->
  <ellipse cx="200" cy="175" rx="48" ry="52" fill="url(#sk_s4)"/>
  <!-- Strong jaw shadow -->
  <ellipse cx="200" cy="210" rx="35" ry="20" fill="#2A0A04" opacity="0.4"/>
  <!-- Eyes - heavy, serious -->
  <ellipse cx="185" cy="169" rx="9" ry="7" fill="#050202"/>
  <ellipse cx="215" cy="169" rx="9" ry="7" fill="#050202"/>
  <circle cx="185" cy="169" r="5" fill="#120606"/>
  <circle cx="215" cy="169" r="5" fill="#120606"/>
  <!-- Cold light catchlight -->
  <circle cx="183" cy="167" r="2" fill="#00D4FF" opacity="0.5"/>
  <circle cx="213" cy="167" r="2" fill="#00D4FF" opacity="0.5"/>
  <!-- Heavy eyebrows -->
  <path d="M175 160 Q185 155 195 158" stroke="#050202" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M205 158 Q215 155 225 160" stroke="#050202" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M197 174 Q196 183 200 186 Q204 183 203 174" fill="#3A1006" opacity="0.5"/>
  <ellipse cx="194" cy="184" rx="6" ry="4" fill="#3A1006" opacity="0.4"/>
  <ellipse cx="206" cy="184" rx="6" ry="4" fill="#3A1006" opacity="0.4"/>
  <!-- Tight lips - serious news -->
  <path d="M188 200 Q200 197 212 200 Q200 205 188 200Z" fill="#6A2810"/>
  <path d="M188 200 Q200 203 212 200" stroke="#4A1808" stroke-width="1.2" fill="none"/>
  <!-- Chin held high -->
  <path d="M175 218 Q200 226 225 218" stroke="#3A1006" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Background hospital/office hint -->
  <rect x="0" y="0" width="80" height="300" fill="#0A1020" opacity="0.3"/>
  <rect x="320" y="0" width="80" height="300" fill="#0A1020" opacity="0.3"/>
</svg>