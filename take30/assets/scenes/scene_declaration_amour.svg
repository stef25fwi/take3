<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="sbg3" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3D1A0A"/>
      <stop offset="60%" stop-color="#1A0D20"/>
      <stop offset="100%" stop-color="#080410"/>
    </radialGradient>
    <radialGradient id="sk_s3" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C8784A"/>
      <stop offset="100%" stop-color="#9A5028"/>
    </radialGradient>
    <radialGradient id="warm3" cx="60%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <filter id="softblur"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#sbg3)"/>
  <!-- Warm light source -->
  <circle cx="280" cy="80" r="100" fill="url(#warm3)"/>
  <!-- Bokeh lights - romantic -->
  <circle cx="50" cy="60" r="20" fill="#FFB800" opacity="0.08" filter="url(#softblur)"/>
  <circle cx="340" cy="40" r="15" fill="#FF8C00" opacity="0.1" filter="url(#softblur)"/>
  <circle cx="80" cy="250" r="18" fill="#6C5CE7" opacity="0.07" filter="url(#softblur)"/>
  <circle cx="360" cy="240" r="22" fill="#FFB800" opacity="0.06" filter="url(#softblur)"/>
  <!-- Neck -->
  <rect x="173" y="218" width="44" height="52" rx="9" fill="url(#sk_s3)"/>
  <!-- Elegant dress - off shoulder -->
  <ellipse cx="195" cy="285" rx="82" ry="38" fill="#1A1035"/>
  <path d="M145 250 Q195 235 245 250" stroke="#6C5CE7" stroke-width="1.5" fill="none" opacity="0.5"/>
