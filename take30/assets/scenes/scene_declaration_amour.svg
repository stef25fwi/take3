  <path d="M177 164 Q186 158 195 162 Q188 169 177 164Z" fill="#060202"/>
  <path d="M195 162 Q204 158 213 164 Q204 169 195 162Z" fill="#060202"/>
  <!-- Iris -->
  <circle cx="184" cy="163" r="4" fill="#1A0808"/>
  <circle cx="206" cy="163" r="4" fill="#1A0808"/>
  <circle cx="184" cy="163" r="2" fill="#060202"/>
  <circle cx="206" cy="163" r="2" fill="#060202"/>
  <!-- Warm catchlight -->
  <circle cx="185.5" cy="161.5" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="207.5" cy="161.5" r="1.8" fill="white" opacity="0.9"/>
  <!-- Eyebrows - gentle -->
  <path d="M176 155 Q185 151 194 153" stroke="#060202" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M196 153 Q205 151 214 155" stroke="#060202" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M192 167 Q191 174 195 177 Q199 174 198 167" fill="#904A20" opacity="0.3"/>
