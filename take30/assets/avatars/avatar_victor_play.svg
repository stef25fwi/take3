    <ellipse cx="115" cy="107" rx="7" ry="5.5" fill="#1A0802"/>
    <!-- Iris - dark brown with warmth -->
    <circle cx="85" cy="107" r="4" fill="#3A1808"/>
    <circle cx="115" cy="107" r="4" fill="#3A1808"/>
    <circle cx="85" cy="107" r="2" fill="#0A0402"/>
    <circle cx="115" cy="107" r="2" fill="#0A0402"/>
    <circle cx="86.5" cy="105.5" r="1.5" fill="white"/>
    <circle cx="116.5" cy="105.5" r="1.5" fill="white"/>
