    <path d="M78 99 Q85 95 93 97" stroke="#1A0802" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <path d="M107 97 Q115 95 122 99" stroke="#1A0802" stroke-width="2.8" fill="none" stroke-linecap="round"/>
