<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle1"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg1" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2D1B4E"/>
      <stop offset="100%" stop-color="#0D0920"/>
    </radialGradient>
    <radialGradient id="skin1" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C68B59"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#circle1)">
    <!-- Background -->
    <rect width="200" height="200" fill="url(#bg1)"/>
    <!-- Glow effect -->
    <circle cx="100" cy="80" r="90" fill="url(#glow1)"/>
    <!-- Neck -->
    <rect x="83" y="128" width="34" height="32" rx="8" fill="url(#skin1)"/>
    <!-- Shoulders -->
    <ellipse cx="100" cy="175" rx="60" ry="35" fill="#1A1035"/>
    <!-- Clothing accent -->
    <path d="M65 175 Q100 155 135 175" stroke="#6C5CE7" stroke-width="2" fill="none"/>
    <!-- Hair base - afro shape -->
    <ellipse cx="100" cy="82" rx="52" ry="55" fill="#1A0A00"/>
    <!-- Hair texture - curls -->
    <circle cx="60" cy="75" r="18" fill="#1A0A00"/>
    <circle cx="140" cy="75" r="18" fill="#1A0A00"/>
    <circle cx="78" cy="48" r="16" fill="#1A0A00"/>
    <circle cx="122" cy="48" r="16" fill="#1A0A00"/>
    <circle cx="100" cy="42" r="16" fill="#1A0A00"/>
    <!-- Individual curl highlights -->
    <circle cx="62" cy="68" r="6" fill="#2D1500" opacity="0.6"/>
    <circle cx="138" cy="70" r="5" fill="#2D1500" opacity="0.6"/>
    <circle cx="80" cy="44" r="5" fill="#2D1500" opacity="0.6"/>
    <!-- Face -->
    <ellipse cx="100" cy="110" rx="36" ry="38" fill="url(#skin1)"/>
    <!-- Eyes -->
    <ellipse cx="86" cy="104" rx="6" ry="5" fill="#1A0A00"/>
    <ellipse cx="114" cy="104" rx="6" ry="5" fill="#1A0A00"/>
    <circle cx="88" cy="103" r="2" fill="white"/>
    <circle cx="116" cy="103" r="2" fill="white"/>
    <!-- Eye sparkle -->
    <circle cx="89" cy="102" r="1" fill="white"/>
    <circle cx="117" cy="102" r="1" fill="white"/>
    <!-- Eyebrows -->
    <path d="M79 97 Q86 93 93 95" stroke="#1A0A00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M107 95 Q114 93 121 97" stroke="#1A0A00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M97 108 Q100 116 103 108" stroke="#7A4A2A" stroke-width="1.5" fill="none"/>
    <ellipse cx="94" cy="114" rx="4" ry="2.5" fill="#7A4A2A" opacity="0.5"/>
    <ellipse cx="106" cy="114" rx="4" ry="2.5" fill="#7A4A2A" opacity="0.5"/>
    <!-- Lips - fuller shape -->
    <path d="M89 122 Q100 118 111 122 Q100 130 89 122Z" fill="#C0604A"/>
    <path d="M89 122 Q100 126 111 122" stroke="#A84A38" stroke-width="1" fill="none"/>
    <!-- Smile lines -->
    <path d="M87 122 Q84 126 86 130" stroke="#7A4A2A" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M113 122 Q116 126 114 130" stroke="#7A4A2A" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Gold earring -->
    <circle cx="64" cy="115" r="4" fill="#FFB800" opacity="0.9"/>
    <circle cx="136" cy="115" r="4" fill="#FFB800" opacity="0.9"/>
    <!-- Verified badge overlay -->
    <circle cx="155" cy="155" r="18" fill="#00D4FF"/>
    <path d="M147 155 L153 161 L163 149" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>