  <path d="M152 155 Q155 115 190 110 Q225 115 228 155 Q220 138 190 133 Q160 138 152 155Z" fill="#080404"/>
  <path d="M152 155 Q148 170 152 185 Q155 165 158 155Z" fill="#080404"/>
