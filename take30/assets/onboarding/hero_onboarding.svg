  <rect x="0" y="0" width="375" height="60" fill="#04020A" opacity="0.5"/>

  <!-- Take30 watermark subtle -->
  <text x="188" y="30" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="800" fill="white" opacity="0.1" letter-spacing="-1">Take30</text>
