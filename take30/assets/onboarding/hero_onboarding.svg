  <ellipse cx="310" cy="200" rx="42" ry="65" fill="#1A0803"/>
  <path d="M270 165 Q267 205 272 240" fill="#100602" opacity="0.9"/>
  <path d="M350 165 Q353 205 348 240" fill="#100602" opacity="0.9"/>
