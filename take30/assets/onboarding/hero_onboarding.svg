    <filter id="oblur"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="oblur2"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="375" height="300" fill="url(#obg)"/>
  <!-- Atmospheric orbs -->
  <circle cx="80" cy="80" r="60" fill="#6C5CE7" opacity="0.12" filter="url(#oblur)"/>
  <circle cx="300" cy="200" r="70" fill="#FFB800" opacity="0.08" filter="url(#oblur)"/>
  <circle cx="200" cy="150" r="80" fill="#00D4FF" opacity="0.06" filter="url(#oblur)"/>

